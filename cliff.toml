# git-cliff configuration - generates CHANGELOG.md from commit messages
# Adjust `types` and `title` sections to match your commit message conventions


[changelog]
header = "Changelog"
body = """
{%- macro remote_url() -%}
    https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% macro print_commit(commit) -%}
    - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
      {% if commit.breaking %}[**破坏性更改**] {% endif %}\
      {{ commit.message | upper_first }}\
      ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))\
      {%- if commit.remote.username %} by [@{{ commit.remote.username }}](https://github.com/{{ commit.remote.username }}){% endif -%}
{% endmacro -%}

{% for group, commits in commits | group_by(attribute="group") %}
## {{ group | striptags | trim }}
    {%- set unique_commits = commits | unique(attribute="message") %}
    {%- for commit in unique_commits | filter(attribute="scope") | sort(attribute="scope") %}
        {{ self::print_commit(commit=commit) }}
    {%- endfor %}
    {%- for commit in unique_commits | filter(attribute="scope", value=false) %}
        {{ self::print_commit(commit=commit) }}
    {%- endfor %}
{% endfor -%}

{% if github and github.contributors | length != 0 %}
## 贡献者

感谢以下贡献者的贡献：

{% for contributor in github.contributors %}
    - @{{ contributor.username }} ([#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}))
{%- endfor %}
{%- endif %}
"""
trim = true
footer = "<!-- generated by git-cliff -->"
# 将 #123 转为链接（GitHub 会自动重定向 PR 号）
postprocessors = [
    { pattern = "#([0-9]+)", replace = "[#${1}](https://github.com/fengyec2/FreeMove/issues/${1})" }
]

[git]
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->🚀 新增功能与优化" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug 修复" },
    { message = "^perf", group = "<!-- 0 -->🚀 新增功能与优化" },
	{ message = "^refactor", group = "🛠️ 功能重构" },
    { message = "^security", group = "<!-- 2 -->🔒 安全修复" },
    { message = "^docs", group = "<!-- 3 -->📚 文档更新" },
    { message = "^build", group = "<!-- 4 -->🔧 构建系统" },
    { message = "^ci", group = "<!-- 4 -->🔧 构建系统" },
    { message = "^revert", group = "<!-- 9 -->◀️ 回滚的功能" },
    { message = ".*", group = "<!-- 9 -->📦 其他变更" },
]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
remote = "origin"
sort_commits = "newest"

[remote.github]
owner = "fengyec2"
repo = "FreeMove"

[bump]
features_always_bump_minor = true
breaking_always_bump_major = true